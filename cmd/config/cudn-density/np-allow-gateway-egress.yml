# allow-gateway-egress: Opens egress from client pods to all cluster
# default gateway IPs (one per availability zone). This enables ICMP (ping)
# traffic to validate north-south reachability under CUDN scale.
#
# Selects: pods with app=client
# Allows egress to:
#   - All unique cluster gateway IPs on all protocols (ICMP for ping)
#   - Any destination on port 53 UDP/TCP (DNS resolution)
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-gateway-egress-{{.Replica}}
spec:
  podSelector:
    matchLabels:
      app: client
  egress:
  - to:
    {{- range $gw := splitList "," .gatewayIPs }}
    - ipBlock:
        cidr: {{ $gw }}/32
    {{- end }}
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  policyTypes:
  - Egress
