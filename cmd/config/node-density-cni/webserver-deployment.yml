kind: Deployment
apiVersion: apps/v1
metadata:
  name: webserver-{{.Replica}}-{{.Iteration}}
spec:
  template:
    metadata:
      labels:
        name: webserver-{{.Replica}}-{{.Iteration}}
        app: webserver
      annotations:
        test: ovsperf
{{if gt .sriovs 0}}
        k8s.v1.cni.cncf.io/networks: '[{{range $i := untilStep 1 (int (add .numSriovs 1)) 1}}{{if ne $i 1}},{{end}}{"name":"{{$.sriovNetworkName}}","interface":"sriov{{$i}}"}{{end}}]'
{{end}}
{{if .perfProfile}}
        irq-load-balancing.crio.io: "disable"
        cpu-quota.crio.io: "disable"
{{end}}
    spec:
{{if .perfProfile}}
      runtimeClassName: performance-{{.perfProfile}}
{{end}}
      topologySpreadConstraints:
      - maxSkew: 1 
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway 
        labelSelector: 
          matchLabels:
            app: webserver
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution: {{.nodeSelector|toJson}}
      containers:
      - name: webserver
        image: quay.io/cloud-bulldozer/sampleapp:latest
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
        ports:
        - containerPort: 8080
          protocol: TCP
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: false
      restartPolicy: Always
  replicas: 1
  selector:
    matchLabels:
      name: webserver-{{.Replica}}-{{.Iteration}}
  strategy:
    type: RollingUpdate
