# This workload has special hardware requirements.
# In order to meet those requirements we have added CI tests in e2e-benchmarking:
# https://github.com/openshift/release/tree/master/ci-operator/step-registry/cloud-bulldozer/e2e-benchmarking
---
global:
  gc: {{.GC}}
  gcMetrics: {{.GC_METRICS}}
  measurements:
    - name: podLatency
      thresholds:
        - conditionType: Ready
          metric: P99
          threshold: {{.POD_READY_THRESHOLD}}
metricsEndpoints:
{{ if .ES_SERVER }}
  - metrics: [{{.METRICS}}]
    alerts: [{{.ALERTS}}]
    indexer:
      esServers: ["{{.ES_SERVER}}"]
      insecureSkipVerify: true
      defaultIndex: {{.ES_INDEX}}
      type: opensearch
{{ end }}
{{ if .LOCAL_INDEXING }}
  - metrics: [{{.METRICS}}]
    alerts: [{{.ALERTS}}]
    indexer:
      type: local
      metricsDirectory: collected-metrics-{{.UUID}}
{{ end }}
jobs:
  - name: evpn-create-namespaces
    namespace: evpn
    jobIterations: {{.JOB_ITERATIONS}}
    qps: {{.QPS}}
    burst: {{.BURST}}
    namespacedIterations: true
    waitWhenFinished: true
    skipIndexing: true
    jobPause: 1m
    namespaceLabels:
      security.openshift.io/scc.podSecurityLabelSync: false
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/warn: privileged
      k8s.ovn.org/primary-user-defined-network: ""
    objects:
      - objectTemplate: configmap.yml
        replicas: 1

  - name: evpn-create-cudn
    {{- $numCudn := div .JOB_ITERATIONS .NAMESPACES_PER_CUDN }}
    jobIterations: {{$numCudn}}
    qps: {{.QPS}}
    burst: {{.BURST}}
    namespacedIterations: false
    waitWhenFinished: true
    jobPause: 15m
    skipIndexing: true
    namespaceLabels:
      security.openshift.io/scc.podSecurityLabelSync: false
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/warn: privileged
      k8s.ovn.org/primary-user-defined-network: ""
{{ if .CREATE_EXT_FRR_VRF }}
    hooks:
      - cmd: ["bash", "cleanup_external_frr_vrf.sh", "{{$numCudn}}"]
        when: beforeJobExecution
      - cmd: ["bash", "setup_external_frr_vrf.sh", "{{$numCudn}}", "{{.EXTERNAL_WEBSERVER_IP}}", "{{.L3VNI_START}}"]
        when: beforeJobExecution
{{ end }}
    objects:
      - objectTemplate: cudn.yml
        replicas: 1
        inputVars:
          namespaces_per_cudn: {{.NAMESPACES_PER_CUDN}}
          total_namespaces: {{.JOB_ITERATIONS}}
          scenario: "{{.SCENARIO}}"
          l3vni_start: {{.L3VNI_START}}

  - name: evpn-route-advertisements
    {{- $numCudn := div .JOB_ITERATIONS .NAMESPACES_PER_CUDN }}
    jobIterations: {{$numCudn}}
    qps: {{.QPS}}
    burst: {{.BURST}}
    namespacedIterations: false
    waitWhenFinished: true
    jobPause: 10m
    skipIndexing: true
    namespaceLabels:
      security.openshift.io/scc.podSecurityLabelSync: false
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/warn: privileged
      k8s.ovn.org/primary-user-defined-network: ""
    objects:
      - objectTemplate: ra.yml
        replicas: 1

  - name: evpn-{{.SCENARIO}}
    {{- $numCudn := div .JOB_ITERATIONS .NAMESPACES_PER_CUDN }}
    namespace: evpn
    jobIterations: {{$numCudn}}
    qps: {{.QPS}}
    burst: {{.BURST}}
    namespacedIterations: true
    podWait: false
    waitWhenFinished: true
    preLoadImages: true
    namespaceLabels:
      security.openshift.io/scc.podSecurityLabelSync: false
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/warn: privileged
      k8s.ovn.org/primary-user-defined-network: ""
{{ if .CREATE_EXT_FRR_VRF }}
    hooks:
      - cmd: ["bash", "cleanup_external_frr_vrf.sh", "{{$numCudn}}"]
        when: afterJobExecution
{{ end }}
    objects:
{{ if eq .SCENARIO "east-west" }}
      - objectTemplate: webserver-deployment.yml
        replicas: 1

      - objectTemplate: webserver-service.yml
        replicas: 1

      - objectTemplate: curl-deployment.yml
        replicas: 1
        inputVars:
          webserver_hostname: ""
          webserver_port: ""
{{ else }}
      - objectTemplate: curl-deployment.yml
        replicas: 1
        inputVars:
          webserver_hostname: "{{.EXTERNAL_WEBSERVER_IP}}"
          webserver_port: "{{.EXTERNAL_WEBSERVER_PORT}}"
{{ end }}
