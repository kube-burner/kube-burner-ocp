---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: db-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-server
      pattern: app-database
  template:
    metadata:
      labels:
        app: db-server
        pattern: app-database
        role: server
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/worker
                operator: Exists
              - key: node-role.kubernetes.io/infra
                operator: DoesNotExist
              - key: node-role.kubernetes.io/workload
                operator: DoesNotExist
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  pattern: app-database
                  role: client
              topologyKey: kubernetes.io/hostname
      containers:
      - name: uperf-server
        image: {{.uperfImage}}
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 20000
          protocol: TCP
          name: uperf
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting uperf server (db-server) on port 20000"
          uperf -s -v -P 20000
        imagePullPolicy: IfNotPresent
