---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: client-{{.Replica}}
spec:
  replicas: {{.podReplicas}}
  selector:
    matchLabels:
      name: udn-icnt-client-{{.Replica}}
  template:
    metadata:
      labels:
        name: udn-icnt-client-{{.Replica}}
        app: client
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "3"
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: client
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/worker
                operator: Exists
              - key: node-role.kubernetes.io/infra
                operator: DoesNotExist
              - key: node-role.kubernetes.io/workload
                operator: DoesNotExist
      containers:
      - name: client-app
        image: quay.io/cloud-bulldozer/curl:latest
        {{- $side := mod .Iteration 2 }}
        {{- $peerNs := ternary (add .Iteration 1) (sub .Iteration 1) (eq $side 0) }}
        command:
          - "/bin/sh"
          - "-c"
          - |
            while true; do
              curl --fail -sS http://icnt-svc.udn-icnt-{{ $peerNs }}.svc.cluster.local:8080 -o /dev/null 2>/dev/null && echo "OK->ns-{{ $peerNs }}" || echo "FAIL->ns-{{ $peerNs }}";
              sleep 10
            done
        resources:
          requests:
            memory: "10Mi"
            cpu: "10m"
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: false
        readinessProbe:
          exec:
            command:
            - "/bin/sh"
            - "-c"
            - "curl --fail -sS http://icnt-svc.udn-icnt-{{ $peerNs }}.svc.cluster.local:8080/ -o /dev/null"
          periodSeconds: 1
          timeoutSeconds: 5
          failureThreshold: 60
        volumeMounts:
        - name: podinfo
          mountPath: /etc/podlabels
      volumes:
      - name: podinfo
        downwardAPI:
          items:
            - path: "labels"
              fieldRef:
                fieldPath: metadata.labels
      restartPolicy: Always
  strategy:
    type: RollingUpdate
