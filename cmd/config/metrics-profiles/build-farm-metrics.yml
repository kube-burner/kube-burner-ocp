# etcd DB Size

- query: avg(etcd_mvcc_db_total_size_in_bytes)
  metricName: etcdDBTotalSize

- query: avg(etcd_mvcc_db_total_size_in_use_in_bytes)
  metricName: etcdDBSizeInUse

- query: avg(etcd_mvcc_db_total_size_in_bytes) - avg(etcd_mvcc_db_total_size_in_use_in_bytes)
  metricName: etcdDBFragmentationBytes

# Cluster events

- query: cluster:usage:resources:sum{resource="events"}
  metricName: clusterEventCount

- query: sum(rate(etcd_requests_total{resource="events", operation=~"create|update|delete"}[2m]))
  metricName: etcdEventWriteRate

- query: sum(rate(etcd_requests_total{resource="events", operation=~"get|list|listWithCount"}[2m]))
  metricName: etcdEventReadRate
