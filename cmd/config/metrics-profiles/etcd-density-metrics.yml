# Etcd density metrics profile — etcd sharding A/B comparison KPIs
# Etcd DB size (time series — track growth during test)

- query: avg(etcd_mvcc_db_total_size_in_bytes)
  metricName: etcdDBTotalSize

- query: avg(etcd_mvcc_db_total_size_in_use_in_bytes)
  metricName: etcdDBSizeInUse

- query: avg(etcd_mvcc_db_total_size_in_bytes) - avg(etcd_mvcc_db_total_size_in_use_in_bytes)
  metricName: etcdDBFragmentationBytes

- query: etcd_mvcc_db_total_size_in_bytes
  metricName: etcdDBTotalSizePerInstance

- query: etcd_mvcc_db_total_size_in_use_in_bytes
  metricName: etcdDBSizeInUsePerInstance

# Etcd disk I/O latency (time series)

- query: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[2m]))
  metricName: 99thEtcdDiskWalFsyncDurationSeconds

- query: histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket[2m]))
  metricName: 99thEtcdDiskBackendCommitDurationSeconds

- query: histogram_quantile(0.99, rate(etcd_network_peer_round_trip_time_seconds_bucket[5m]))
  metricName: 99thEtcdRoundTripTimeSeconds

- query: delta(etcd_debugging_mvcc_db_compaction_total_duration_milliseconds_sum[1m:30s])/2 > 0
  metricName: 99thEtcdCompaction

- query: delta(etcd_disk_backend_defrag_duration_seconds_sum[1m:30s])/2 > 0
  metricName: 99thEtcdDefrag

# Etcd raft write pressure (time series)

- query: rate(etcd_server_proposals_committed_total[2m])
  metricName: etcdProposalsCommittedRate

- query: rate(etcd_server_proposals_failed_total[2m])
  metricName: etcdProposalsFailedRate

# Etcd event rates (time series)

- query: sum(rate(etcd_requests_total{resource="events", operation=~"create|update|delete"}[2m]))
  metricName: etcdEventWriteRate

- query: sum(rate(etcd_requests_total{resource="events", operation=~"get|list|listWithCount"}[2m]))
  metricName: etcdEventReadRate

- query: cluster:usage:resources:sum{resource="events"}
  metricName: clusterEventCount

# Etcd storage object distribution (time series)

- query: topk(20, max by (resource) (apiserver_storage_objects))
  metricName: etcdStorageObjects

# API server (time series)

- query: histogram_quantile(0.99, sum(irate(apiserver_request_duration_seconds_bucket{apiserver="kube-apiserver", verb=~"LIST|GET", subresource!~"log|exec|portforward|attach|proxy"}[2m])) by (le, resource, verb, scope)) > 0
  metricName: readOnlyAPICallsLatency

- query: histogram_quantile(0.99, sum(irate(apiserver_request_duration_seconds_bucket{apiserver="kube-apiserver", verb=~"POST|PUT|DELETE|PATCH", subresource!~"log|exec|portforward|attach|proxy"}[2m])) by (le, resource, verb, scope)) > 0
  metricName: mutatingAPICallsLatency

- query: sum(irate(apiserver_request_total{apiserver="kube-apiserver",verb!="WATCH"}[2m])) by (verb,resource,code) > 0
  metricName: APIRequestRate

- query: sum(irate(apiserver_request_total{apiserver="kube-apiserver",verb!="WATCH",code=~"5.."}[2m])) by (verb,resource,code) > 0
  metricName: APIServerErrors

# Control plane containers: etcd + kube-apiserver (time series)

- query: (sum(irate(container_cpu_usage_seconds_total{name!="",container!~"POD|",namespace=~"openshift-etcd|openshift-kube-apiserver"}[2m]) * 100) by (container, pod, namespace, node)) > 0
  metricName: containerCPU

- query: sum(container_memory_rss{name!="",container!~"POD|",namespace=~"openshift-etcd|openshift-kube-apiserver"}) by (container, pod, namespace, node)
  metricName: containerMemory

# Scheduler (time series)

- query: sum(irate(scheduler_schedule_attempts_total{result="scheduled"}[2m]))
  metricName: schedulerThroughput

- query: histogram_quantile(0.99, sum(rate(scheduler_e2e_scheduling_duration_seconds_bucket[2m])) by (le))
  metricName: 99thSchedulerE2ELatency

# Cluster object counts (time series)

- query: sum(kube_namespace_status_phase) by (phase) > 0
  metricName: namespaceCount

- query: sum(kube_pod_status_phase{}) by (phase)
  metricName: podStatusCount

# Node CPU & memory — masters host etcd (time series)

- query: (sum(irate(node_cpu_seconds_total[2m])) by (mode,instance) and on (instance) label_replace(kube_node_role{role="master"}, "instance", "$1", "node", "(.+)")) > 0
  metricName: nodeCPU-Masters

- query: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) and on (instance) label_replace(kube_node_role{role="master"}, "instance", "$1", "node", "(.+)")
  metricName: nodeMemoryUtilization-Masters

# ---
# Instant queries: single-value snapshots captured at start and end of test
# ---

- query: etcd_mvcc_db_total_size_in_bytes
  metricName: etcdDBTotalSizeSnapshot
  instant: true
  captureStart: true

- query: etcd_server_proposals_committed_total
  metricName: etcdProposalsCommitted
  instant: true
  captureStart: true

- query: etcd_server_slow_apply_total
  metricName: etcdSlowApplyTotal
  instant: true
  captureStart: true

- query: etcd_server_leader_changes_seen_total
  metricName: etcdLeaderChanges
  instant: true
  captureStart: true

- query: etcd_debugging_mvcc_db_compaction_total_duration_milliseconds_sum
  metricName: 99thEtcdCompaction-raw
  instant: true
  captureStart: true

- query: etcd_disk_backend_defrag_duration_seconds_sum
  metricName: 99thEtcdDefrag-raw
  instant: true
  captureStart: true

- query: topk(20, max by (resource) (apiserver_storage_objects))
  metricName: etcdStorageObjectsSnapshot
  instant: true
  captureStart: true

- query: sum by (cluster_version)(etcd_cluster_version)
  metricName: etcdVersion
  instant: true

- query: count(kube_configmap_info{})
  metricName: configmapCount
  instant: true

- query: count(kube_service_info{})
  metricName: serviceCount
  instant: true

- query: kube_node_role
  metricName: nodeRoles
  instant: true

- query: sum(node_cpu_seconds_total and on (instance) label_replace(kube_node_role{role="master"}, "instance", "$1", "node", "(.+)")) by (mode)
  metricName: nodeCPUSeconds-Masters
  instant: true
  captureStart: true

- query: sum(node_cpu_seconds_total and on (instance) label_replace(kube_node_role{role="worker",role!="infra"}, "instance", "$1", "node", "(.+)")) by (mode)
  metricName: nodeCPUSeconds-Workers
  instant: true
  captureStart: true

- query: sum(container_cpu_usage_seconds_total{id=~"/system.slice|/system.slice/kubelet.service|.*/ovs-vswitchd.service|/system.slice/crio.service|/kubepods.slice"} and on (node) kube_node_role{role="master"}) by (id)
  metricName: cgroupCPUSeconds-Masters
  instant: true
  captureStart: true

- query: sum(container_memory_rss{id=~"/system.slice|/system.slice/kubelet.service|.*/ovs-vswitchd.service|/system.slice/crio.service|/kubepods.slice"} and on (node) kube_node_role{role="master"}) by (id)
  metricName: cgroupMemoryRSS-Masters
  instant: true
  captureStart: true

- query: sum(container_cpu_usage_seconds_total{container!~"POD|",namespace=~"openshift-.*"}) by (namespace)
  metricName: cgroupCPUSeconds-namespaces
  instant: true
  captureStart: true

- query: sum(container_memory_rss{container!~"POD|",namespace=~"openshift-.*"}) by (namespace)
  metricName: cgroupMemoryRSS-namespaces
  instant: true
  captureStart: true
